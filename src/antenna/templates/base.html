<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Antenna{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Antenna</a>
      <nav class="nav">
        <a href="/videos?process=uncheck">Review</a>
        <a href="/videos?process=checked">Checked</a>
        <a href="/accounts">Accounts</a>
        <a href="/settings">Settings</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script>
      function renderLocalTimes(root = document) {
        const formatter = new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
        root.querySelectorAll("[data-local-time]").forEach((element) => {
          const value = element.getAttribute("datetime") || element.dataset.localTime;
          if (!value) return;
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return;
          element.textContent = formatter.format(date);
        });
      }
      renderLocalTimes();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
